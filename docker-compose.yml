services:
  # ===================================================================
  # FRONTEND - Next.js 14 (on local; production goes to Vercel)
  # ===================================================================
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_GATEWAY_URL=http://gateway:3001
    depends_on:
      - gateway
    networks:
      - omnidynamic

  # ===================================================================
  # API GATEWAY / BFF - NestJS
  # ===================================================================
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - GATEWAY_PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - GATEWAY_SUPABASE_URL=${SUPABASE_URL}
      - GATEWAY_SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - PRICING_SOLVER_GRPC_HOST=pricing-solver
      - PRICING_SOLVER_GRPC_PORT=50051
      - ORDER_SERVICE_URL=http://order-service:3004
    depends_on:
      - pricing-solver
      - order-service
    networks:
      - omnidynamic

  # ===================================================================
  # INGESTION LAYER - Java 21 / Spring WebFlux
  # ===================================================================
  ingestion:
    build:
      context: ./services/ingestion
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - INGESTION_PORT=3002
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC_INVENTORY=inventory-events
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - omnidynamic

  # ===================================================================
  # PRICING SOLVER - C++ 20 / Drogon + gRPC
  # ===================================================================
  pricing-solver:
    build:
      context: ./services/pricing-solver
      dockerfile: Dockerfile
    ports:
      - "3003:3003" # HTTP debug
      - "50051:50051" # gRPC
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - redis
    networks:
      - omnidynamic

  # ===================================================================
  # ORDER SERVICE - .NET 8 / Akka.NET
  # ===================================================================
  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    ports:
      - "3004:3004"
    environment:
      - ORDER_SERVICE_PORT=3004
      - SUPABASE_DB_URL_ORDERS=${DATABASE_URL}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - omnidynamic

  # ===================================================================
  # INFRASTRUCTURE
  # ===================================================================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test:
        [
          "CMD",
          "kafka-topics",
          "--list",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
    depends_on:
      - zookeeper
    networks:
      - omnidynamic

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - omnidynamic

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - omnidynamic

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      - kafka
    networks:
      - omnidynamic

networks:
  omnidynamic:
    driver: bridge
