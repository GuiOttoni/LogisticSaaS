services:
  # ===================================================================
  # FRONTEND - Next.js 14 (on local; production goes to Vercel)
  # ===================================================================
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_GATEWAY_URL=http://gateway:3001
    depends_on:
      - gateway
      - promtail
    networks:
      - omnidynamic

  # ===================================================================
  # API GATEWAY / BFF - NestJS
  # ===================================================================
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - GATEWAY_PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - GATEWAY_SUPABASE_URL=${SUPABASE_URL}
      - GATEWAY_SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - PRICING_SOLVER_GRPC_HOST=pricing-solver
      - PRICING_SOLVER_GRPC_PORT=50051
      - ORDER_SERVICE_URL=http://order-service:3004
      - CATALOG_SERVICE_URL=http://catalog-service:3005
    depends_on:
      - pricing-solver
      - order-service
      - catalog-service
      - promtail
    networks:
      - omnidynamic

  # ===================================================================
  # INGESTION LAYER - Java 21 / Spring WebFlux
  # ===================================================================
  ingestion:
    build:
      context: ./services/ingestion
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - INGESTION_PORT=3002
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC_INVENTORY=inventory-events
    depends_on:
      - promtail
      - kafka
    networks:
      - omnidynamic

  # ===================================================================
  # PRICING SOLVER - C++ 20 / Drogon + gRPC
  # ===================================================================
  pricing-solver:
    build:
      context: ./services/pricing-solver
      dockerfile: Dockerfile
    ports:
      - "3003:3003" # HTTP debug
      - "50060:50051" # gRPC
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - redis
      - promtail
    networks:
      - omnidynamic

  # ===================================================================
  # ORDER SERVICE - .NET 8 / Akka.NET
  # ===================================================================
  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    ports:
      - "3004:3004"
    environment:
      - ORDER_SERVICE_PORT=3004
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - promtail
      - kafka
    networks:
      - omnidynamic

  # ===================================================================
  # CATALOG SERVICE - .NET 8 / Minimal API
  # ===================================================================
  catalog-service:
    build:
      context: ./services/catalog-service
      dockerfile: Dockerfile
    ports:
      - "3005:3005"
    environment:
      - ASPNETCORE_URLS=http://+:3005
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      - promtail
    networks:
      - omnidynamic

  # ===================================================================
  # INFRASTRUCTURE
  # ===================================================================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test:
        [
          "CMD",
          "kafka-topics",
          "--list",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
    depends_on:
      - zookeeper
    networks:
      - omnidynamic

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - omnidynamic

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - omnidynamic

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8081:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      - kafka
    networks:
      - omnidynamic

  # ===================================================================
  # OBSERVABILITY
  # ===================================================================
  loki:
    image: grafana/loki:main
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - omnidynamic

  promtail:
    image: grafana/promtail:main
    volumes:
      - ./infra/monitoring/promtail/config.yml:/etc/promtail/config.yml
      # Mount docker socket for reading container logs if we decide to
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    ports:
      - "1514:1514"
      - "9080:9080"
    depends_on:
      - loki
    networks:
      - omnidynamic

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - omnidynamic

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    command:
      - '-port=8080'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8080:8080"
    networks:
      - omnidynamic

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    ports:
      - "3006:3000"
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki
      - prometheus
    networks:
      - omnidynamic

  docs-site:
    build:
      context: ./docs-site
      dockerfile: Dockerfile
    ports:
      - "3007:80"
    networks:
      - omnidynamic

networks:
  omnidynamic:
    driver: bridge
