services:
  # ===================================================================
  # FRONTEND - Next.js 14 (on local; production goes to Vercel)
  # ===================================================================
  frontend:
    container_name: logisticsaas-frontend
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_GATEWAY_URL=http://localhost:3001
    labels:
      service_name: "frontend"
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_GATEWAY_URL=http://localhost:3001
    depends_on:
      - gateway
      - promtail
    networks:
      - omnidynamic

  # ===================================================================
  # API GATEWAY / BFF - NestJS
  # ===================================================================
  gateway:
    container_name: logisticsaas-gateway
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    labels:
      service_name: "gateway"
    ports:
      - "3001:3001"
    environment:
      - GATEWAY_PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - GATEWAY_SUPABASE_URL=${SUPABASE_URL}
      - GATEWAY_SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - PRICING_SOLVER_GRPC_HOST=pricing-solver
      - PRICING_SOLVER_GRPC_PORT=50051
      - ORDER_SERVICE_URL=http://order-service:3004
      - CATALOG_SERVICE_URL=http://catalog-service:3005
    depends_on:
      pricing-solver:
        condition: service_started
      order-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      promtail:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - omnidynamic

  # ===================================================================
  # INGESTION LAYER - Java 21 / Spring WebFlux
  # ===================================================================
  ingestion:
    container_name: logisticsaas-ingestion
    build:
      context: ./services/ingestion
      dockerfile: Dockerfile
    labels:
      service_name: "ingestion"
    ports:
      - "3002:3002"
    environment:
      - INGESTION_PORT=3002
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC_INVENTORY=inventory-events
    depends_on:
      promtail:
        condition: service_started
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - omnidynamic

  # ===================================================================
  # PRICING SOLVER - C++ 20 / Drogon + gRPC
  # ===================================================================
  pricing-solver:
    container_name: logisticsaas-pricing-solver
    build:
      context: ./services/pricing-solver
      dockerfile: Dockerfile
    labels:
      service_name: "pricing-solver"
    ports:
      - "3003:3003" # HTTP debug
      - "50060:50051" # gRPC
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=${DATABASE_URL}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-6543}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-postgres}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC_INVENTORY=inventory-events
    depends_on:
      redis:
        condition: service_started
      promtail:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/pricing-rules"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omnidynamic

  # ===================================================================
  # ORDER SERVICE - .NET 8 / Akka.NET
  # ===================================================================
  order-service:
    container_name: logisticsaas-order-service
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    labels:
      service_name: "order-service"
    ports:
      - "3004:3004"
    environment:
      - ASPNETCORE_URLS=http://+:3004
      - ORDER_SERVICE_PORT=3004
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC_INVENTORY=inventory-events
      - KAFKA_TOPIC_ORDERS=order-events
    depends_on:
      promtail:
        condition: service_started
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/reservations"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omnidynamic

  # ===================================================================
  # CATALOG SERVICE - .NET 8 / Minimal API
  # ===================================================================
  catalog-service:
    container_name: logisticsaas-catalog-service
    build:
      context: ./services/catalog-service
      dockerfile: Dockerfile
    labels:
      service_name: "catalog-service"
    ports:
      - "3005:3005"
    environment:
      - ASPNETCORE_URLS=http://+:3005
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      promtail:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/api/products"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omnidynamic

  # ===================================================================
  # INFRASTRUCTURE
  # ===================================================================
  kafka:
    container_name: logisticsaas-kafka
    image: confluentinc/cp-kafka:7.6.0
    labels:
      service_name: "kafka"
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test:
        [
          "CMD",
          "kafka-topics",
          "--list",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
    depends_on:
      - zookeeper
    networks:
      - omnidynamic

  zookeeper:
    container_name: logisticsaas-zookeeper
    image: confluentinc/cp-zookeeper:7.6.0
    labels:
      service_name: "zookeeper"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - omnidynamic

  redis:
    container_name: logisticsaas-redis
    image: redis:7.2-alpine
    labels:
      service_name: "redis"
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - omnidynamic

  kafka-ui:
    container_name: logisticsaas-kafka-ui
    image: provectuslabs/kafka-ui:v0.7.2
    labels:
      service_name: "kafka-ui"
    ports:
      - "8081:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      - kafka
    networks:
      - omnidynamic

  kafka-init:
    container_name: logisticsaas-kafka-init
    image: confluentinc/cp-kafka:7.6.0
    labels:
      service_name: "kafka-init"
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "echo 'Waiting for Kafka...' && \
      kafka-topics --bootstrap-server kafka:9092 --list && \
      echo 'Creating topics...' && \
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic inventory-events --replication-factor 1 --partitions 1 && \
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic order-events --replication-factor 1 --partitions 1 && \
      echo 'Topics created.'"
    networks:
      - omnidynamic

  # ===================================================================
  # OBSERVABILITY
  # ===================================================================
  loki:
    container_name: logisticsaas-loki
    image: grafana/loki:3.1.0
    labels:
      service_name: "loki"
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - omnidynamic

  promtail:
    container_name: logisticsaas-promtail
    image: grafana/promtail:3.1.0
    labels:
      service_name: "promtail"
    volumes:
      - ./infra/monitoring/promtail/config.yml:/etc/promtail/config.yml
      # Mount docker socket for reading container logs if we decide to
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    ports:
      - "1514:1514"
      - "9080:9080"
    depends_on:
      - loki
    networks:
      - omnidynamic

  prometheus:
    container_name: logisticsaas-prometheus
    image: prom/prometheus:v2.53.0
    labels:
      service_name: "prometheus"
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - omnidynamic

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    command:
      - '-port=8080'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8080:8080"
    networks:
      - omnidynamic

  grafana:
    container_name: logisticsaas-grafana
    image: grafana/grafana:11.1.0
    labels:
      service_name: "grafana"
    environment:
      # SECURITY: anonymous access disabled — use admin/admin on first login and change immediately
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_DISABLE_LOGIN_FORM=false
    ports:
      - "3006:3000"
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki
      - prometheus
    networks:
      - omnidynamic

  docs-site:
    build:
      context: ./docs-site
      dockerfile: Dockerfile
    ports:
      - "3007:80"
    networks:
      - omnidynamic

networks:
  omnidynamic:
    driver: bridge
